version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RATE_LIMIT_PER_MIN=30
      - PORT=8000
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
