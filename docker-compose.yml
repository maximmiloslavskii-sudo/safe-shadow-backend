version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RATE_LIMIT_PER_MIN=30
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Для локального запуска:
#   docker-compose up --build
#
# Для Railway/Render — пушить репо и настроить Deploy Hook,
# переменная PORT выставляется автоматически.
